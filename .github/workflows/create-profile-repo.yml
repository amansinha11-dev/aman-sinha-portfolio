name: 🚀 Create GitHub Profile README

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to create/update the amansinha11-dev profile repository'
        required: true
        default: 'yes'

jobs:
  create-profile-repo:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "yes" ]; then
            echo "❌ You must type 'yes' in the confirm field to proceed."
            exit 1
          fi

      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Create and push profile README
        env:
          PROFILE_PAT: ${{ secrets.PROFILE_PAT }}
        run: |
          set -e

          # Configure git to use the token securely via credential helper
          git config --global user.name "Aman Sinha"
          git config --global user.email "sinhaaman479@gmail.com"
          git config --global credential.helper "!f() { echo username=x-token; echo password=$PROFILE_PAT; }; f"

          REPO="amansinha11-dev/amansinha11-dev"

          echo "🔍 Checking if profile repo exists..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $PROFILE_PAT" \
            "https://api.github.com/repos/$REPO")

          if [ "$STATUS" = "404" ]; then
            echo "📦 Creating repository $REPO ..."
            curl -s -X POST \
              -H "Authorization: token $PROFILE_PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/user/repos \
              -d "{\"name\":\"amansinha11-dev\",\"description\":\"👋 My GitHub Profile README\",\"public\":true,\"auto_init\":false}"
            echo "✅ Repository created."
            sleep 3
          else
            echo "✅ Repository already exists — will update the README."
          fi

          # Clone the profile repo (token passed via credential helper, not in URL)
          echo "📥 Cloning profile repo..."
          git clone "https://github.com/$REPO.git" profile-repo

          # Copy the README
          echo "📝 Copying README..."
          cp github-profile/README.md profile-repo/README.md

          cd profile-repo

          # Commit and push
          git add README.md
          if git diff --cached --quiet; then
            echo "ℹ️  README is already up to date — no changes to commit."
          else
            git commit -m "✨ Add professional GitHub profile README"
            git push origin HEAD:main
            echo "🎉 Successfully pushed profile README to https://github.com/$REPO"
          fi

      - name: Summary
        run: |
          echo "## ✅ Done!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Your professional GitHub profile is now live at:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "👉 **https://github.com/amansinha11-dev**" >> $GITHUB_STEP_SUMMARY
